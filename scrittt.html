<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Dashboard</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    .card {
      background: #111;
      border: 2px solid #00ff00;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ff00;
      padding: 20px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      color: #00ff00;
    }
    .card h2 {
      color: #00ff00;
      margin-bottom: 15px;
    }
    button {
      background: #00ff00;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin: 5px 0;
    }
    button:hover { opacity: 0.9; }
    .message { margin-top: 12px; }
    .count { font-size: 18px; margin-bottom: 10px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      display: none;
    }
    table, th, td {
      border: 1px solid #00ff00;
      padding: 8px;
      text-align: center;
    }
    th { background: #222; }
  </style>
</head>
<body>
  <div class="card">
    <h2>👤 Bmb Vcf Dashboard</h2>
    
    <div class="count" id="count">Loading members...</div>

    <button onclick="downloadContacts()">📥 Download VCF</button>
    <button onclick="downloadPDF()">📄 Download PDF</button>
    <button onclick="toggleMembers()">👥 View Members</button>

    <div id="message" class="message"></div>

    <table id="membersTable">
      <thead>
        <tr><th>Name</th><th>Phone</th></tr>
      </thead>
      <tbody id="membersBody"></tbody>
    </table>
  </div>

  <script>
    const message = document.getElementById("message");

    async function fetchCount() {
      try {
        const res = await fetch("/api/count");
        const data = await res.json();
        document.getElementById("count").textContent = 
          `👥 Total Members: ${data.count}`;
      } catch {
        document.getElementById("count").textContent = "Error loading count ❌";
      }
    }

    async function toggleMembers() {
      const table = document.getElementById("membersTable");
      const body = document.getElementById("membersBody");
      
      if (table.style.display === "table") {
        table.style.display = "none";
        return;
      }
      
      try {
        const res = await fetch("/api/list");
        const data = await res.json();
        body.innerHTML = "";
        data.forEach(member => {
          const row = `<tr><td>${escapeHtml(member.name)}</td><td>${escapeHtml(member.phone)}</td></tr>`;
          body.innerHTML += row;
        });
        table.style.display = "table";
        table.scrollIntoView({ behavior: "smooth", block: "start" });
        message.textContent = "✅ Members loaded";
        message.style.color = "#00ff00";
      } catch {
        message.textContent = "Error fetching members ❌";
        message.style.color = "red";
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Download VCF (GET, no password)
    function downloadContacts() {
      window.location.href = "/api/download";
    }

    // Download PDF (GET, no password) - same as VCF now
    function downloadPDF() {
      window.location.href = "/api/pdf";
    }

    fetchCount();
    setInterval(fetchCount, 5000);
  </script>
</body>
</html>
